appId: com.shinobi.desktop
productName: Shinobi
directories:
  output: release
asarUnpack:
  - native/build/**/*.node
  - native/build/**/*.dylib
files:
  - dist/**/*
  - assets/**/*
  - native/build/**/*
  - package.json
  - node_modules/electron-updater/**/*
icon: assets/icon.png
publish:
  provider: github
  owner: mhensberg2003
  repo: shinobi
linux:
  target:
    - AppImage
    - deb
  category: AudioVideo
  icon: assets/icon.png
mac:
  target:
    - dmg
  category: public.app-category.entertainment
  icon: assets/icon.png
win:
  target:
    - nsis
  icon: assets/icon.png
